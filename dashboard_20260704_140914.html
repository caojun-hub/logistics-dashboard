<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* 主题色变量：深色(默认) */
  body {
    --bg: #0d1117; --fg: #e6edf3; --fg-muted: #8b949e; --fg-empty: #484f58;
    --module-bg: #161b22; --module-border: #30363d; --title-bg: #21262d;

    --zone: #79c0ff; --good: #3fb950; --bad: #f85149; --warn: #d29922;
    --warn-bar-bg: #3d1f1f;
    background: var(--bg); color: var(--fg);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 12px; width: 2400px; margin: 0 auto; padding: 16px;
  }
  /* 浅色主题：覆盖变量 */
  body.theme-light {
    --bg: #f6f8fa; --fg: #24292f; --fg-muted: #57606a; --fg-empty: #8c959f;
    --module-bg: #ffffff; --module-border: #d0d7de; --title-bg: #f3f4f6;
    --row-border: #eaeef2; --subtotal-bg: #eef1f4; --grp-bg: #e9ecef;
    --matrix-alt: #f3f4f6; --matrix-base: #ffffff;
    --zone: #0969da; --good: #1a7f37; --bad: #cf222e; --warn: #9a6700;
    --warn-bar-bg: #ffebe9;
  }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .header h1 { font-size: 20px; }
  .header .ts { color: var(--fg-muted); font-size: 13px; }
  .warn-bar { background: var(--warn-bar-bg); border-left: 4px solid var(--bad); padding: 8px 12px; margin-bottom: 14px; border-radius: 4px; font-size: 12px; }
  .warn-bar b { color: var(--bad); }
  .module { background: var(--module-bg); border: 1px solid var(--module-border); border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
  .module-title { background: var(--title-bg); padding: 7px 14px; font-weight: 600; font-size: 13px; border-bottom: 1px solid var(--module-border); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 4px 5px; text-align: center; border-bottom: 1px solid var(--row-border); white-space: nowrap; }
  th { background: var(--title-bg); color: var(--fg-muted); font-weight: 500; font-size: 11px; }
  td.zone { font-weight: 600; color: var(--zone); }
  td.city { }
  tr.subtotal td { background: var(--subtotal-bg); font-weight: 600; }
  .grp-th { background: var(--grp-bg); text-align: center; border-right: 1px solid var(--module-border); font-size: 12px; }
  /* 运力线矩阵：不同运力线组交替背景色，界线更明显 */
  .matrix td.lg0, .matrix th.lg0 { background: var(--matrix-base); }
  .matrix td.lg1, .matrix th.lg1 { background: var(--matrix-alt); }
  .matrix td.lg2, .matrix th.lg2 { background: var(--matrix-base); }
  .matrix td.lg3, .matrix th.lg3 { background: var(--matrix-alt); }
  .matrix td.lg4, .matrix th.lg4 { background: var(--matrix-base); }
  .matrix .line-divider { border-left: none; }
  .num { color: var(--fg); }
  .pct-good { color: var(--good); }
  .pct-bad { color: var(--bad); }
  .pct-warn { color: var(--warn); }
  .delta-up { color: var(--bad); font-size: 10px; }
  .delta-down { color: var(--good); font-size: 10px; }
  .delta-up-r { color: var(--good); font-size: 10px; }
  .delta-down-r { color: var(--bad); font-size: 10px; }
  .empty { color: var(--fg-empty); }
</style>
</head>

function getCell(row, field){

  return c;
}

  return c.value;
}

  if(!c) return null;

}

function fmtDelta(v){
  if(v===null||v===undefined||v===''||v==='—') return '<span class="empty">—</span>';
  let n = typeof v==='number' ? v : parseFloat(String(v).replace('%','').replace('+',''));
  if(isNaN(n)) return '<span class="empty">—</span>';
  const pct = (n*100).toFixed(1);
  const sign = n>0?'+':'';
  return sign+pct+'%';
}
function deltaCls(v, reverse){
  if(v===null||v===undefined||v===''||v==='—') return 'empty';
  let n = typeof v==='number' ? v : parseFloat(String(v).replace('%','').replace('+',''));
  if(isNaN(n)||n===0) return 'empty';
  if(reverse) return n>0?'delta-up-r':'delta-down-r';
  return n>0?'delta-up':'delta-down';
}
function pctCls(v, good, bad){
  const n = parseFloat(String(v).replace('%',''));
  if(isNaN(n)) return 'num';
  if(n>=good) return 'pct-good';
  if(n<=bad) return 'pct-bad';
  return 'pct-warn';
}
function findSummary(city){ return SUMMARY.find(r=>r['三级市']===city); }

// ============ 预警条 ============
(function renderWarn(){
  const tt = TAIL.tt_below_threshold||[];
  const tl = TAIL.t_longest||[];
  const cq = TAIL.cq_delta_tail||[];
  const parts = [];
  if(tt.length) parts.push('<b>妥投<98%</b> '+tt.length+'个: '+tt.slice(0,5).map(w=>w[0]).join('、'));
  if(tl.length) parts.push('<b>T时长长</b> '+tl.length+'个: '+tl.map(w=>w[0]+'('+Number(w[2]).toFixed(1)+'分)').join('、'));
  if(cq.length) parts.push('<b>出勤环比低</b> '+cq.length+'个: '+cq.map(w=>w[0]).join('、'));
  document.getElementById('warn-bar').innerHTML = parts.length ? '⚠ '+parts.join('　|　') : '当前无预警';
})();

(function renderYunli(){
  // [字段名, 显示名, 类型, good, bad, 是否带环比, 是否计算字段]
  const cols = [
    {f:'kai_gong_driver_count', t:'开工骑手数', type:'num', good:0, bad:0, dw:true, calc:null},
    {f:'current_shift_driver_count', t:'应开工', type:'num', good:0, bad:0, dw:false, calc:null},
    {f:'shift_online_driver_count', t:'排班且开工', type:'num', good:0, bad:0, dw:false, calc:null},
    {f:'shift_online_driver_rate', t:'开工率', type:'pct', good:90, bad:75, dw:false, calc:null},
    {f:'rest_driver_count', t:'小休骑手数', type:'num', good:0, bad:0, dw:false, calc:null},
    {f:'rest_rate', t:'小休骑手占比', type:'pct', good:0, bad:20, dw:false, calc:'restPct'},
    {f:'kai_gong_idle_driver_count', t:'开工空闲骑手数', type:'num', good:0, bad:0, dw:false, calc:null},
    {f:'kai_gong_idle_rate', t:'开工空闲率', type:'pct', good:5, bad:30, dw:false, calc:null},
    {f:'driver_payload', t:'骑手负载', type:'num', good:0, bad:0, dw:false, calc:null},
  ];
  // 注：SUMMARY_ROWS 的字段名是中文 title，需映射
  const titleMap = {
    'kai_gong_driver_count':'开工骑手数',
    'current_shift_driver_count':'当前排班应开工骑手数',
    'shift_online_driver_count':'当前排班且开工骑手数',
    'shift_online_driver_rate':'当前排班开工率',
    'rest_driver_count':'小休骑手数',
    'kai_gong_idle_driver_count':'开工空闲骑手数',
    'kai_gong_idle_rate':'开工空闲率',
    'driver_payload':'骑手负载',
  };
  function getVal(row, f, calc){
    if(!row) return null;
    if(calc==='restPct'){
      const rest = valOf(row,'小休骑手数');
      const attend = valOf(row,'出勤骑手数');
      if(typeof rest==='number' && typeof attend==='number' && attend>0){
        return (rest/attend*100).toFixed(2)+'%';
      }
      return null;
    }
    const title = titleMap[f];
    return valOf(row, title);
  }
  function getDay(row, f){
    const title = titleMap[f];
    if(!title) return null;
    return dayOf(row, title);
  }
  function getWeek(row, f){
    const title = titleMap[f];
    if(!title) return null;
    return weekOf(row, title);
  }
  let html = '<table><thead><tr><th>战区</th><th class="city">区县</th>';
  cols.forEach(c=>{
    const span = c.dw ? 3 : 1;
    html += '<th class="grp-th" colspan="'+span+'">'+c.t+'</th>';
  });
  html += '</tr><tr><th></th><th></th>';
  cols.forEach(c=>{
    if(c.dw) html += '<th>值</th><th>日</th><th>周</th>';
    else html += '<th>值</th>';
  });
  html += '</tr></thead><tbody>';

  let lastZone = '';
  cities.forEach(city=>{
    const row = findSummary(city);
    const zone = cityToZone[city] || '';
    const zoneCell = (zone!==lastZone) ? '<td class="zone" rowspan="'+countCitiesInZone(zone)+'">'+zone+'</td>' : '';
    lastZone = zone;
    html += '<tr>'+zoneCell+'<td class="city">'+city+'</td>';
    cols.forEach(c=>{
      const val = getVal(row, c.f, c.calc);
      const valHtml = c.type==='pct' ? '<span class="'+pctCls(val,c.good,c.bad)+'">'+valOrDash(val)+'</span>' : '<span class="num">'+valOrDash(val)+'</span>';
      html += '<td>'+valHtml+'</td>';
      if(c.dw){
        const isRate = c.type==='pct';
        html += '<td class="'+deltaCls(getDay(row,c.f), !isRate)+'">'+fmtDelta(getDay(row,c.f))+'</td>';
        html += '<td class="'+deltaCls(getWeek(row,c.f), !isRate)+'">'+fmtDelta(getWeek(row,c.f))+'</td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tbl-yunli').innerHTML = html;
})();

// ============ 子表3: 运力线出勤矩阵（精简6指标，普众放最后）============
(function renderMatrix(){
  // 普众放最后
  const PREFERRED = ['专送','优选','蜂跑','优远','普众'];
  const lines = LINE_NAMES.filter(n=>n && !['未知','联盟'].includes(n))
    .sort((a,b)=>{ const ia=PREFERRED.indexOf(a), ib=PREFERRED.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });
  // 每运力线6指标：开工骑手数(带日周)/应开工/排班且开工/开工率/空闲率/负载
  const cols = [
    {f:'开工骑手数', t:'开工骑手', dw:true},
    {f:'当前排班应开工骑手数', t:'应开工', dw:false},
    {f:'当前排班且开工骑手数', t:'排班且开工', dw:false},
    {f:'当前排班开工率', t:'开工率', dw:false, pct:true, good:90, bad:75},
    {f:'开工空闲率', t:'空闲率', dw:false, pct:true, good:5, bad:30},
    {f:'骑手负载', t:'负载', dw:false},
  ];
  const spanPerLine = cols.reduce((s,c)=>s+(c.dw?3:1),0);
  let html = '<table><thead><tr><th>战区</th><th class="city">区县</th>';
  lines.forEach((ln,li)=>{
    const cls = 'lg'+li + (li>0?' line-divider':'');
    html += '<th class="grp-th '+cls+'" colspan="'+spanPerLine+'">'+ln+'</th>';
  });
  html += '</tr><tr><th></th><th></th>';
  lines.forEach((ln,li)=>{
    const cls = 'lg'+li + (li>0?' line-divider':'');
    cols.forEach(c=>{
      const span = c.dw ? 3 : 1;
      html += '<th class="'+cls+'" colspan="'+span+'">'+c.t+'</th>';
    });
  });
  html += '</tr><tr><th></th><th></th>';
  lines.forEach((ln,li)=>{
    const cls = 'lg'+li + (li>0?' line-divider':'');
    cols.forEach(c=>{
      if(c.dw) html += '<th class="'+cls+'">值</th><th class="'+cls+'">日</th><th class="'+cls+'">周</th>';
      else html += '<th class="'+cls+'">值</th>';
    });
  });
  html += '</tr></thead><tbody>';

  let lastZone = '';
  cities.forEach(city=>{
    const zone = cityToZone[city] || '';
    const zoneCell = (zone!==lastZone) ? '<td class="zone" rowspan="'+countCitiesInZone(zone)+'">'+zone+'</td>' : '';
    lastZone = zone;
    html += '<tr>'+zoneCell+'<td class="city">'+city+'</td>';
    lines.forEach((ln,li)=>{
      const cls = 'lg'+li + (li>0?' line-divider':'');
      const rows = (LINE_ROWS[ln]||[]).filter(r=>r['三级市']===city);
      const r = rows[0];
      const det = DETAIL[city+'_'+ln] || {};
      cols.forEach(c=>{
        let val = null;
        if(r) val = valOf(r, c.f);
        if((val===null||val==='') && det[c.f]) val = det[c.f];
        if(c.f==='开工空闲率' && (val===null||val==='')) val = det['开工空闲率'];
        if(c.f==='骑手负载' && (val===null||val==='')) val = det['骑手负载'];
        const isPct = c.pct;
        const valHtml = isPct ? '<span class="'+pctCls(val,c.good,c.bad)+'">'+valOrDash(val)+'</span>' : '<span class="num">'+valOrDash(val)+'</span>';
        html += '<td class="'+cls+'">'+valHtml+'</td>';
        if(c.dw){
          let day=null, week=null;
          if(r){ day=dayOf(r,c.f); week=weekOf(r,c.f); }
          html += '<td class="'+cls+' '+deltaCls(day,!isPct)+'">'+fmtDelta(day)+'</td>';
          html += '<td class="'+cls+' '+deltaCls(week,!isPct)+'">'+fmtDelta(week)+'</td>';
        }
      });
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tbl-matrix').innerHTML = html;
})();
